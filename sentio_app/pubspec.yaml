name: sentio_app
description: "Sentio - Bienestar emocional para emprendedores"
publish_to: 'none'
version: 1.0.3+5

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Navigation
  go_router: ^14.0.0
  # State Management
  provider: ^6.1.0
  # Backend
  supabase_flutter: ^2.0.0
  # HTTP
  http: ^1.2.0
  # Storage
  shared_preferences: ^2.3.0
  # UI
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  # Celebrations
  confetti: ^0.7.0
  # Audio
  audioplayers: ^6.1.0
  # Notifications
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  # Push (OneSignal) — se activa cuando hay onesignal_app_id en app_config
  onesignal_flutter: ^5.2.0
  # Utils
  intl: ^0.19.0
  uuid: ^4.5.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  share_plus: ^12.0.2
  youtube_player_flutter: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0

flutter_native_splash:
  color: "#000000"
  image: "assets/images/splash_logo.png"
  android_12:
    image: "assets/images/splash_logo.png"
    color: "#000000"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: NotoEmoji
      fonts:
        - asset: assets/fonts/NotoEmoji.ttf
